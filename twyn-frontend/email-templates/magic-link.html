<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access your Twyn account</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #ffffff;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .brand {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 32px;
        }
        h1 {
            margin: 0 0 24px;
            font-size: 24px;
            font-weight: 600;
            color: #000000;
        }
        p {
            margin: 0 0 32px;
            font-size: 16px;
            color: #666666;
        }
        .button {
            display: inline-block;
            padding: 16px 32px;
            background-color: #000000;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
        }
        .footer {
            margin-top: 32px;
            font-size: 14px;
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">Twyn</div>
        
        <h1>Access your account</h1>
        
        <p>Click the button below to login or signup for your Twyn account.</p>
        
        <a href="{{ .ConfirmationURL }}" class="button">Continue to Twyn</a>
        
        <div class="footer">
            <p>This link will expire in 1 hour.</p>
        </div>
    </div>
</body>
</html>
